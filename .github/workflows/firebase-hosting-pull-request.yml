name: Deploy to Firebase Hosting on PR
'on': pull_request
jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    steps:
      # Обновляем на v4 для поддержки Node.js 24
      - uses: actions/checkout@v4
      
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MOJBUHGALTER_3EA88 }}'
          projectId: mojbuhgalter-3ea88
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
          # Форсируем использование актуальной версии Node
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true