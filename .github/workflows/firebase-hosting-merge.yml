name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # Обновляем версию с v2 на v4 (поддерживает Node.js 24)
      - uses: actions/checkout@v4
      
      # FirebaseExtended обычно сам обновляет рантайм внутри v0, 
      # но мы добавим флаг принудительного перехода на Node 24
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MOJBUHGALTER_3EA88 }}'
          channelId: live
          projectId: mojbuhgalter-3ea88
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
